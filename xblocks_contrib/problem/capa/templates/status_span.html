{% load i18n %}
{% if status_id %}
    <span class="status {% if not hide_correctness %}{{ status.classname }}{% endif %}"
          id="status_{{ status_id }}"
          data-tooltip="{% if not hide_correctness %}{{ status.display_tooltip }}{% endif %}">
    {% else %}
        <span class="status {% if not hide_correctness %}{{ status.classname }}{% endif %}"
              data-tooltip="{% if not hide_correctness %}{{ status.display_tooltip }}{% endif %}">
        {% endif %}
        {% if not hide_correctness %}
            <span class="sr">{{ status.display_name }}</span>
            <span class="status-icon" aria-hidden="true"></span>
        {% endif %}
    </span>
