<div class="annotatable_xblock">
    <div class="annotatable-wrapper">
        <div class="annotatable-header">
            <h3 class="hd hd-3 annotatable-title">{self.display_name}</h3>
        </div>

        <div class="annotatable-section shaded">
            <div class="annotatable-section-title">
                Instructions
                <a class="annotatable-toggle annotatable-toggle-instructions expanded" href="javascript:void(0)"
                    >Collapse Instructions</a
                >
            </div>
            <div class="annotatable-section-body annotatable-instructions">{self.instructions_html}</div>
        </div>

        <div class="annotatable-section">
            <div class="annotatable-section-title">
                Guided Discussion
                <a class="annotatable-toggle annotatable-toggle-annotations" href="javascript:void(0)"
                    >Hide Annotations</a
                >
            </div>
            <div class="annotatable-section-body annotatable-content">{self.content_html}</div>
        </div>
    </div>
</div>
